services:
  old-primary:
    image: 'mysql:8.4.5'
    environment:
      MYSQL_DATABASE: community_old_primary
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - './mysql/primary/init:/docker-entrypoint-initdb.d:ro'
    command:
      - '--server-id=1'
      - '--log-bin=mysql-bin'
      - '--binlog-format=ROW'
      - '--gtid-mode=ON'
      - '--enforce-gtid-consistency=ON'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20

  old-secondary:
    image: 'mysql:8.4.5'
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3307:3306'
    volumes:
      - './mysql/secondary/start-replica.sh:/opt/mysql/start-replica.sh:ro'
    command:
      - 'bash'
      - '/opt/mysql/start-replica.sh'
    healthcheck:
      test: ['CMD-SHELL', 'mysql -uroot -proot -Nse "SHOW REPLICA STATUS\\G" | grep -q "Replica_IO_Running: Yes" && mysql -uroot -proot -Nse "SHOW REPLICA STATUS\\G" | grep -q "Replica_SQL_Running: Yes"']
      interval: 5s
      timeout: 5s
      retries: 30

  new-db:
    image: 'mysql:8.4.5'
    environment:
      MYSQL_DATABASE: community_new
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3308:3306'
    volumes:
      - './mysql/new/init:/docker-entrypoint-initdb.d:ro'
    command:
      - '--server-id=3'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20

  flagd:
    image: 'ghcr.io/open-feature/flagd:v0.12.0'
    command:
      - 'start'
      - '--uri'
      - 'file:/etc/flagd/flags.flagd.json'
    ports:
      - '8013:8013'
    volumes:
      - './flags.flagd.json:/etc/flagd/flags.flagd.json:ro'
